name: WhatsApp AI Bot (Baileys)

on:
  workflow_dispatch:          # manual trigger
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push QR files back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start bot (background) and push QR files
        run: |
          # Start the bot in the background
          node bot/bot.js &
          BOT_PID=$!

          # Give it time to generate QR and update files
          sleep 20

          # Commit updated QR image & page back to the repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/qr.png docs/index.html
          git commit -m "Update QR code [skip ci]" || echo "No changes to commit"
          git push

          # Wait for the bot to finish (or until timeout)
          wait $BOT_PID
