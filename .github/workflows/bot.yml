name: WhatsApp AI Bot

on:
  # Allows manual trigger from GitHub UI
  workflow_dispatch:
  # Runs automatically when code is pushed (excluding public/ commits to avoid loops)
  push:
    paths-ignore:
      - 'public/**'
      - '**.md'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Write permission needed to push QR code back to repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is not essential but keeps things clean
          fetch-depth: 0
          # This token allows us to push back
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start bot (background) and update QR code
        run: |
          # Start the bot process in the background
          node bot/whatsapp.js &
          BOT_PID=$!

          # Wait a moment for the QR code to be generated
          sleep 15

          # Commit the freshly generated QR files
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/qr.png public/index.html
          git commit -m "Update QR code [skip ci]" || echo "No changes to commit"
          git push

          # Now wait for the bot to finish (it will run until the workflow times out)
          wait $BOT_PID
