name: WhatsApp AI Bot (Baileys)

on:
  workflow_dispatch:          # manual trigger
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push QR files back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # fetch all history so we can rebase

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start bot (background) and update QR files
        run: |
          # Start the bot in the background
          node bot/bot.js &
          BOT_PID=$!

          # Wait for the QR code to be generated and saved
          sleep 20

          # Configure git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull the latest remote changes to avoid push conflict
          git pull --rebase origin main

          # Stage and commit the updated QR files
          git add docs/qr.png docs/index.html
          git commit -m "Update QR code [skip ci]" || echo "No changes to commit"

          # Push back to the repository
          git push origin main

          # Keep the bot alive (wait for it to finish or until timeout)
          wait $BOT_PID
